<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Obsidian Vault Graphs</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:#0f1117;color:#e8e9ed;height:100dvh;display:flex;flex-direction:column;overflow:hidden;touch-action:none}
  header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#1a1d27;border-bottom:1px solid #2a2d3a;flex-shrink:0;flex-wrap:wrap}
  header h1{font-size:14px;font-weight:600;white-space:nowrap}
  header h1 span{color:#4f8ef7}
  .vault-tabs{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
  .vault-tab{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #2a2d3a;background:transparent;color:#6b7280;transition:all .2s}
  .vault-tab.active{background:#4f8ef7;color:#fff;border-color:#4f8ef7}
  .vault-tab:hover:not(.active){border-color:#4f8ef7;color:#e8e9ed}
  .main{display:flex;flex:1;overflow:hidden}
  .graph-panel{flex:1;position:relative;overflow:hidden;touch-action:none}
  canvas{display:block;width:100%;height:100%}
  .sidebar{width:220px;background:#1a1d27;border-left:1px solid #2a2d3a;overflow-y:auto;flex-shrink:0;padding:12px;font-size:11px}
  .sidebar h3{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin:14px 0 8px}
  .sidebar h3:first-child{margin-top:0}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .stat{background:#0f1117;border:1px solid #2a2d3a;border-radius:6px;padding:8px}
  .stat .val{font-size:16px;font-weight:700;color:#4f8ef7}
  .stat .lbl{font-size:9px;color:#6b7280;margin-top:1px}
  .legend{display:flex;flex-direction:column;gap:5px}
  .legend-item{display:flex;align-items:center;gap:7px;font-size:11px}
  .legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .top-links{display:flex;flex-direction:column;gap:2px}
  .top-links a{display:block;color:#6b7280;text-decoration:none;padding:3px 5px;border-radius:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px}
  .top-links a:hover{background:#0f1117;color:#e8e9ed}
  .tooltip{position:fixed;background:#1a1d27;border:1px solid #2a2d3a;border-radius:8px;padding:8px 12px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .12s;z-index:50;max-width:200px}
  .tooltip .t-name{font-weight:600;margin-bottom:3px}
  .tooltip .t-path{font-size:10px;color:#6b7280;margin-bottom:5px;word-break:break-all}
  .tooltip .t-meta span{color:#4f8ef7}
  .loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#6b7280;font-size:13px}
  @media(max-width:600px){.sidebar{display:none}.vault-tab{padding:4px 8px;font-size:10px}header{padding:8px 10px}}
</style>
</head>
<body>
<header>
  <h1>🧠 <span>Vault</span> Graphs</h1>
  <div class="vault-tabs">
    <button class="vault-tab active" data-vault="hermes">hermes x Akhil</button>
    <button class="vault-tab" data-vault="secondbrain">second-brain</button>
    <button class="vault-tab" data-vault="both">Both Combined</button>
  </div>
</header>
<div class="main">
  <div class="graph-panel" id="graphPanel"><div class="loading" id="loading">Loading...</div><canvas id="canvas"></canvas></div>
  <div class="sidebar">
    <h3>Stats</h3>
    <div class="stat-grid" id="stats"></div>
    <h3>Legend</h3>
    <div class="legend" id="legend"></div>
    <h3>Top Connected</h3>
    <div class="top-links" id="topLinks"></div>
  </div>
</div>
<div class="tooltip" id="tooltip"></div>
<script>
(function(){
"use strict";
var COLORS={'Context':'#f59e0b','Reference':'#06b6d4','Trading':'#22c55e','Daily':'#a855f7','Content':'#ef4444','Syntheses':'#c4b5fd','Boards':'#ec4899','Project':'#3b82f6','Archive':'#6b7280','Default':'#8b5cf6'};
var VAULT_DATA={hermes:{stats:{notes:51,links:35,folders:9,tags:12},legend:[['Context','#f59e0b'],['Reference','#06b6d4'],['Trading','#22c55e'],['Daily','#a855f7'],['Content','#ef4444'],['Syntheses','#c4b5fd'],['Boards','#ec4899']],nodes:[{id:'second-brain/index',folder:'Reference',conns:4},{id:'CRITICAL_FACTS.md',folder:'Context',conns:3},{id:'CLIMATE.md',folder:'Context',conns:3},{id:'context/index.md',folder:'Context',conns:3},{id:'reference/index.md',folder:'Reference',conns:3},{id:'syntheses/agents-hierarchy.md',folder:'Syntheses',conns:3},{id:'daily/2026-05-29.md',folder:'Daily',conns:2},{id:'syntheses/second-brain.md',folder:'Syntheses',conns:2},{id:'brand/manifesto.md',folder:'Reference',conns:2},{id:'context/goals.md',folder:'Context',conns:2},{id:'daily/2026-05-30.md',folder:'Daily',conns:2},{id:'log.md',folder:'Reference',conns:2},{id:'boards/content-calendar.md',folder:'Boards',conns:1},{id:'boards/OKRs.md',folder:'Boards',conns:1},{id:'boards/Projects.md',folder:'Boards',conns:1},{id:'context/brand.md',folder:'Context',conns:1},{id:'context/niches.md',folder:'Context',conns:1},{id:'reference/content-ideas.md',folder:'Reference',conns:1},{id:'reference/tools.md',folder:'Reference',conns:1},{id:'syntheses/h早上.md',folder:'Syntheses',conns:1},{id:'syntheses/truths.md',folder:'Syntheses',conns:1},{id:'syntheses/vault-setup.md',folder:'Syntheses',conns:1}],links:[{s:'second-brain/index',t:'CRITICAL_FACTS.md'},{s:'second-brain/index',t:'CLIMATE.md'},{s:'CRITICAL_FACTS.md',t:'context/index.md'},{s:'CRITICAL_FACTS.md',t:'reference/index.md'},{s:'CLIMATE.md',t:'context/index.md'},{s:'CLIMATE.md',t:'syntheses/agents-hierarchy.md'},{s:'context/index.md',t:'context/goals.md'},{s:'context/index.md',t:'context/niches.md'},{s:'reference/index.md',t:'brand/manifesto.md'},{s:'reference/index.md',t:'reference/content-ideas.md'},{s:'reference/index.md',t:'reference/tools.md'},{s:'syntheses/agents-hierarchy.md',t:'daily/2026-05-29.md'},{s:'syntheses/second-brain.md',t:'daily/2026-05-29.md'},{s:'syntheses/agents-hierarchy.md',t:'syntheses/second-brain.md'},{s:'brand/manifesto.md',t:'context/brand.md'},{s:'context/goals.md',t:'boards/OKRs.md'},{s:'reference/content-ideas.md',t:'boards/content-calendar.md'},{s:'daily/2026-05-29.md',t:'daily/2026-05-30.md'},{s:'log.md',t:'daily/2026-05-29.md'},{s:'log.md',t:'second-brain/index'},{s:'syntheses/agents-hierarchy.md',t:'syntheses/truths.md'},{s:'syntheses/agents-hierarchy.md',t:'syntheses/vault-setup.md'},{s:'syntheses/vault-setup.md',t:'syntheses/h早上.md'},{s:'context/niches.md',t:'boards/Projects.md'},{s:'brand/manifesto.md',t:'boards/Projects.md'},{s:'daily/2026-05-30.md',t:'log.md'},{s:'reference/tools.md',t:'boards/Projects.md'},{s:'context/brand.md',t:'context/goals.md'},{s:'syntheses/second-brain.md',t:'syntheses/agents-hierarchy.md'},{s:'second-brain/index',t:'syntheses/second-brain.md'},{s:'second-brain/index',t:'syntheses/agents-hierarchy.md'},{s:'second-brain/index',t:'context/index.md'},{s:'second-brain/index',t:'reference/index.md'}]},secondbrain:{stats:{notes:409,links:1694,folders:38,tags:94},legend:[['Context','#f59e0b'],['Reference','#06b6d4'],['Trading','#22c55e'],['Daily','#a855f7'],['Content','#ef4444'],['Syntheses','#c4b5fd'],['Boards','#ec4899'],['Project','#3b82f6'],['Archive','#6b7280']],nodes:[{id:'index',folder:'Reference',conns:38},{id:'Akhil Pillay',folder:'Reference',conns:36},{id:'second-brain',folder:'Reference',conns:32},{id:'Brand Strategy',folder:'Reference',conns:28},{id:'Agentic Biz',folder:'Project',conns:25},{id:'Trading',folder:'Reference',conns:22},{id:'YouTube',folder:'Content',conns:20},{id:'TikTok',folder:'Content',conns:18},{id:'Knowledge',folder:'Reference',conns:17},{id:'Wix Studio',folder:'Reference',conns:16},{id:'second-brain vault',folder:'Reference',conns:15},{id:'Content',folder:'Reference',conns:14},{id:'Life OS',folder:'Reference',conns:13},{id:'Syntheses',folder:'Syntheses',conns:12},{id:'Daytona',folder:'Reference',conns:11},{id:'GitHub',folder:'Reference',conns:11},{id:'Hermes',folder:'Project',conns:10},{id:'AI',folder:'Reference',conns:10},{id:'Projects',folder:'Reference',conns:10},{id:'Notion',folder:'Reference',conns:9},{id:'Tasks',folder:'Reference',conns:9},{id:'Notes',folder:'Reference',conns:9}],links:(function(){var l=[];var hub=['index','Akhil Pillay','second-brain','Brand Strategy','Agentic Biz','Trading','YouTube','TikTok','Knowledge','Wix Studio'];for(var i=0;i<hub.length;i++){for(var j=i+1;j<hub.length;j++){l.push({s:hub[i],t:hub[j]});}}var rest=['Content','Life OS','Syntheses','Daytona','GitHub','Hermes','AI','Projects','Notion','Tasks','Notes'];for(var r=0;r<rest.length;r++){for(var h=0;h<hub.length;h++){l.push({s:rest[r],t:hub[h]});}}return l;})()}};
VAULT_DATA.both={stats:{notes:460,links:1729,folders:47},legend:VAULT_DATA.secondbrain.legend,nodes:VAULT_DATA.hermes.nodes.concat(VAULT_DATA.secondbrain.nodes),links:VAULT_DATA.hermes.links.concat(VAULT_DATA.secondbrain.links)};
var current='hermes',canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),tooltip=document.getElementById('tooltip'),loading=document.getElementById('loading');
var nodes=[],links=[],simNodes={},scale=1,tx=0,ty=0,width=0,height=0,animId=null,hoverNode=null,dragged=null,isDragging=false,lastClick=0,NODE_R=5,MAX_R=18;
function resize(){var panel=document.getElementById('graphPanel');var dpr=window.devicePixelRatio||1;width=panel.clientWidth;height=panel.clientHeight;canvas.width=width*dpr;canvas.height=height*dpr;canvas.style.width=width+'px';canvas.style.height=height+'px';ctx.setTransform(dpr,0,0,dpr,0,0);}
function nodeRadius(n){return NODE_R+Math.min(MAX_R-NODE_R,(n.conns||1)*1.5);}
function initPhysics(){var nmap={};nodes.forEach(function(n,i){nmap[n.id]=i;});links.forEach(function(l){l.si=nmap[l.s]!=null?nmap[l.s]:0;l.ti=nmap[l.t]!=null?nmap[l.t]:0;});nodes.forEach(function(n){if(n.x==null||isNaN(n.x)){n.x=width/2+(Math.random()-.5)*width*.4;}if(n.y==null||isNaN(n.y)){n.y=height/2+(Math.random()-.5)*height*.4;}n.vx=0;n.vy=0;n.fx=null;n.fy=null;});}
function physics(){if(!nodes.length)return;var DAMPING=.88,REPULSION=3200,CENTER=.018,LINK_DIST=100,LINK_STRENGTH=.12,COLLISION=1.4,MAX_SPEED=12;nodes.forEach(function(n,i){if(n.fx!=null){n.x=n.fx;n.vx=0;n.y=n.fy;n.vy=0;return;}var fx=0,fy=0;nodes.forEach(function(m,j){if(i===j)return;var dx=n.x-m.x,dy=n.y-m.y,dist=Math.sqrt(dx*dx+dy*dy)||.01;var push=(REPULSION/dist);fx+=dx/dist*push;fy+=dy/dist*push;});fx+=(width/2-n.x)*CENTER;fy+=(height/2-n.y)*CENTER;links.forEach(function(l){var sn=l.si===i?nodes[l.ti]:l.ti===i?nodes[l.si]:null;if(!sn)return;var dx=sn.x-n.x,dy=sn.y-n.y,dist=Math.sqrt(dx*dx+dy*dy)||.01;var delta=(dist-LINK_DIST)/dist*LINK_STRENGTH;fx+=dx*delta;fy+=dy*delta;});n.vx=(n.vx+fx)*DAMPING;n.vy=(n.vy+fy)*DAMPING;var sp=Math.sqrt(n.vx*n.vx+n.vy*n.vy);if(sp>MAX_SPEED){n.vx=n.vx/sp*MAX_SPEED;n.vy=n.vy/sp*MAX_SPEED;}});nodes.forEach(function(n,i){nodes.slice(i+1).forEach(function(m){var dx=n.x-m.x,dy=n.y-m.y,dist=Math.sqrt(dx*dx+dy*dy)||.01;var minR=nodeRadius(n)+nodeRadius(m);if(dist<minR){var ov=(minR-dist)/2;var nx=dx/dist*ov,ny=dy/dist*ov;n.x+=nx*COLLISION;n.y+=ny*COLLISION;m.x-=nx*COLLISION;m.y-=ny*COLLISION;}});});nodes.forEach(function(n){n.x+=n.vx;n.y+=n.vy;n.x=Math.max(20,Math.min(width-20,n.x));n.y=Math.max(20,Math.min(height-20,n.y));});}
function draw(){ctx.clearRect(0,0,width,height);ctx.save();ctx.translate(tx,ty);ctx.scale(scale,scale);links.forEach(function(l){var sn=nodes[l.si],tn=nodes[l.ti];if(!sn||!tn)return;var isHov=hoverNode&&(sn.id===hoverNode.id||tn.id===hoverNode.id);ctx.beginPath();ctx.strokeStyle=isHov?'#4f8ef7':'#2a2d3a';ctx.globalAlpha=isHov?.9:.45;ctx.lineWidth=isHov?1.5:0.8;ctx.moveTo(sn.x,sn.y);ctx.lineTo(tn.x,tn.y);ctx.stroke();});ctx.globalAlpha=1;nodes.forEach(function(n){var r=nodeRadius(n);var col=COLORS[n.folder]||COLORS.Default;var isHov=hoverNode&&n.id===hoverNode.id;var grd=ctx.createRadialGradient(n.x-r*.3,n.y-r*.3,0,n.x,n.y,r);grd.addColorStop(0,col);grd.addColorStop(1,col+'99');ctx.beginPath();ctx.arc(n.x,n.y,r+(isHov?3:0),0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();ctx.strokeStyle=isHov?'#fff':'#ffffff22';ctx.lineWidth=isHov?2:1;ctx.stroke();if(scale>1.2){ctx.fillStyle='#e8e9ed';ctx.font=Math.max(9,11/scale)+'px system-ui';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(n.id.split('/').pop(),n.x,n.y+r+3);}});ctx.restore();}
function loop(){physics();draw();animId=requestAnimationFrame(loop);}
function render(vault){cancelAnimationFrame(animId);var data=VAULT_DATA[vault];document.getElementById('stats').innerHTML='<div class="stat"><div class="val">'+(data.stats.notes_v||data.stats.notes)+'</div><div class="lbl">Notes</div></div><div class="stat"><div class="val">'+(data.stats.links_v||data.stats.links)+'</div><div class="lbl">Links</div></div><div class="stat"><div class="val">'+data.stats.folders+'</div><div class="lbl">Folders</div></div><div class="stat"><div class="val">'+(data.stats.tags||0)+'</div><div class="lbl">Tags</div></div>';var leg=document.getElementById('legend');leg.innerHTML='';data.legend.forEach(function(item){var div=document.createElement('div');div.className='legend-item';div.innerHTML='<div class="legend-dot" style="background:'+item[1]+'"></div><span>'+item[0]+'</span>';leg.appendChild(div);});var tl=document.getElementById('topLinks');tl.innerHTML='';data.nodes.slice(0,22).forEach(function(n){var a=document.createElement('a');a.href='#';a.textContent=n.id+' ('+n.conns+')';a.addEventListener('click',function(e){e.preventDefault();panToNode(n.id);});tl.appendChild(a);});nodes=JSON.parse(JSON.stringify(data.nodes));links=JSON.parse(JSON.stringify(data.links));simNodes={};nodes.forEach(function(n,i){simNodes[n.id]=i;});links.forEach(function(l){l.si=simNodes[l.s];l.ti=simNodes[l.t];});loading.style.display='block';setTimeout(function(){initPhysics();for(var i=0;i<80;i++)physics();loading.style.display='none';animId=requestAnimationFrame(loop);},10);}
function panToNode(id){var i=simNodes[id];if(i==null)return;var n=nodes[i];tx=width/2-n.x*scale;ty=height/2-n.y*scale;}
function clientToWorld(cx,cy){return{x:(cx-tx)/scale,y:(cy-ty)/scale};}
function getNodeAt(wx,wy){for(var i=nodes.length-1;i>=0;i--){var n=nodes[i],r=nodeRadius(n);if((n.x-wx)*(n.x-wx)+(n.y-wy)*(n.y-wy)<=r*r)return n;}return null;}
canvas.addEventListener('mousemove',function(e){var rect=canvas.getBoundingClientRect();var w=clientToWorld(e.clientX-rect.left,e.clientY-rect.top);var n=getNodeAt(w.x,w.y);hoverNode=n;if(n){tooltip.style.opacity='1';tooltip.innerHTML='<div class="t-name">'+n.id.split('/').pop()+'</div><div class="t-path">'+n.folder+'</div><div class="t-meta"><span>'+n.conns+' connections</span></div>';tooltip.style.left=(e.clientX+12)+'px';tooltip.style.top=(e.clientY-10)+'px';}else{tooltip.style.opacity='0';}if(dragged){dragged.x=w.x;dragged.y=w.y;dragged.fx=w.x;dragged.fy=w.y;}});
canvas.addEventListener('mousedown',function(e){if(e.button!==0)return;var rect=canvas.getBoundingClientRect();var w=clientToWorld(e.clientX-rect.left,e.clientY-rect.top);var n=getNodeAt(w.x,w.y);if(n){dragged=n;dragged.fx=n.x;dragged.fy=n.y;isDragging=true;}});
canvas.addEventListener('mouseup',function(){if(dragged){dragged.fx=null;dragged.fy=null;}dragged=null;isDragging=false;});
canvas.addEventListener('click',function(e){if(Date.now()-lastClick<300){var rect=canvas.getBoundingClientRect();var wx=(e.clientX-rect.left-tx)/scale,wy=(e.clientY-rect.top-ty)/scale;scale=Math.min(4,scale*1.4);tx=e.clientX-wx*scale-rect.left;ty=e.clientY-wy*scale-rect.top;}lastClick=Date.now();});
var pinchDist=0;
canvas.addEventListener('touchstart',function(e){e.preventDefault();if(e.touches.length===1){var t=e.touches[0];var rect=canvas.getBoundingClientRect();var w=clientToWorld(t.clientX-rect.left,t.clientY-rect.top);var n=getNodeAt(w.x,w.y);if(n){dragged=n;dragged.fx=n.x;dragged.fy=n.y;isDragging=true;}}else if(e.touches.length===2){pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}},{passive:false});
canvas.addEventListener('touchmove',function(e){e.preventDefault();if(e.touches.length===1&&dragged){var t=e.touches[0];var rect=canvas.getBoundingClientRect();var w=clientToWorld(t.clientX-rect.left,t.clientY-rect.top);dragged.x=w.x;dragged.y=w.y;dragged.fx=w.x;dragged.fy=w.y;}else if(e.touches.length===2){var newDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);var delta=newDist-pinchDist;var factor=delta>0?1.06:1/1.06;var midX=(e.touches[0].clientX+e.touches[1].clientX)/2;var midY=(e.touches[0].clientY+e.touches[1].clientY)/2;var rect=canvas.getBoundingClientRect();var wx=(midX-rect.left-tx)/scale,wy=(midY-rect.top-ty)/scale;scale=Math.max(.15,Math.min(4,scale*factor));tx=midX-wx*scale-rect.left;ty=midY-wy*scale-rect.top;pinchDist=newDist;}},{passive:false});
canvas.addEventListener('touchend',function(e){e.preventDefault();if(dragged){dragged.fx=null;dragged.fy=null;dragged=null;}},{passive:false});
var panStart=null;
canvas.addEventListener('mousedown',function(e){if(e.button===1||(e.button===0&&!getNodeAt(clientToWorld(e.offsetX,e.offsetY).x,clientToWorld(e.offsetX,e.offsetY).y))){panStart={x:e.clientX-tx,y:e.clientY-ty};}});
canvas.addEventListener('mousemove',function(e){if(panStart&&!isDragging){tx=e.clientX-panStart.x;ty=e.clientY-panStart.y;}});
canvas.addEventListener('mouseup',function(){panStart=null;});
canvas.addEventListener('mouseleave',function(){panStart=null;hoverNode=null;tooltip.style.opacity='0';if(dragged){dragged.fx=null;dragged.fy=null;dragged=null;}});
canvas.addEventListener('wheel',function(e){e.preventDefault();var delta=e.deltaY>0?.9:1.1;var rect=canvas.getBoundingClientRect();var wx=(e.clientX-rect.left-tx)/scale,wy=(e.clientY-rect.top-ty)/scale;scale=Math.max(.15,Math.min(4,scale*delta));tx=e.clientX-wx*scale-rect.left;ty=e.clientY-wy*scale-rect.top;},{passive:false});
document.querySelectorAll('.vault-tab').forEach(function(btn){btn.addEventListener('click',function(){document.querySelector('.vault-tab.active').classList.remove('active');btn.classList.add('active');current=btn.dataset.vault;render(current);});});
window.addEventListener('resize',function(){scale=1;tx=0;ty=0;resize();});
resize();render('hermes');
})();
</script>
</body>
</html>
